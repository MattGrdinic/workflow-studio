name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # --- Bump version and tag ---
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skipped: ${{ steps.version.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.skipped == 'false'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  # --- Build macOS ---
  build-mac:
    needs: tag
    if: needs.tag.outputs.skipped == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build server
        run: npm run build

      - name: Build Electron (macOS)
        run: npx electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.zip
            release/*.dmg
          if-no-files-found: error

  # --- Build Windows ---
  build-win:
    needs: tag
    if: needs.tag.outputs.skipped == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build server
        run: npm run build

      - name: Build Electron (Windows)
        run: npx electron-builder --win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            release/*.exe
          if-no-files-found: error

  # --- Create GitHub Release ---
  release:
    needs: [tag, build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/mac-builds/*
            artifacts/win-builds/*
